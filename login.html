<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Roland's Steak House</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/design-system.css">
    <script src="js/design-system.js"></script>
</head>
<body>

    <a href="index.html" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Home
    </a>

    <div class="auth-container">
        <div class="auth-card">
            
            <!-- Login form -->
            <form id="login-form" class="active" onsubmit="handleLogin(event)">
                <div class="auth-icon" id="user-logo-egg">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your details to manage your reservations.</p>
                </div>
                
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth">Sign In</button>

                <div class="auth-links">
                    <a onclick="switchForm('forgot-form')">Forgot Password?</a>
                    <a onclick="switchForm('signup-form')">Create an Account</a>
                </div>
            </form>

            <!-- Sign up form -->
            <form id="signup-form" onsubmit="handleSignUp(event)">
                <div class="auth-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                </div>
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join us for exclusive dining privileges.</p>
                </div>

                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                </div>
                
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a strong password" required>
                </div>

                <button type="submit" class="btn-auth">Sign Up</button>

                <div class="auth-links" style="justify-content: center; margin-top: 20px;">
                    <span style="color: rgba(255,255,255,0.4); margin-right: 8px;">Already have an account?</span>
                    <a onclick="switchForm('login-form')">Sign In</a>
                </div>
            </form>

            <!-- Forgot password form -->
            <form id="forgot-form" onsubmit="handleForgot(event)">
                <div class="auth-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <div class="auth-header">
                    <h2>Reset Password</h2>
                    <p>Enter your email and we'll send a recovery link.</p>
                </div>
                
                <div class="input-group">
                    <label for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="btn-auth">Send Recovery Link</button>

                <div class="auth-links" style="justify-content: center; margin-top: 25px;">
                    <a onclick="switchForm('login-form')" style="display: flex; align-items: center; gap: 6px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Back to Sign In
                    </a>
                </div>
            </form>

        </div>

    </div>

    <script>
        // Form switching logic showing/hiding forms
        function switchForm(formId) {
            document.querySelectorAll('form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(formId).classList.add('active');
        }

        // Handle Login Submission — calls real SQL Server backend
        async function handleLogin(e) {
            e.preventDefault();
            const email    = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn      = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Signing in...';
            btn.disabled    = true;

            try {
                const res  = await fetch('http://localhost:3000/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('loggedInUserName', data.name);
                    window.location.href = 'index.html';
                } else {
                    superModal({ title: 'Login Failed ❌', message: 'Invalid email or password. Please try again.' });
                    btn.textContent = 'Sign In';
                    btn.disabled    = false;
                }
            } catch (err) {
                // Server offline — fallback: derive name from email
                console.warn('Server offline, using local fallback:', err);
                const namePart = email.split('@')[0];
                const name = namePart.charAt(0).toUpperCase() + namePart.slice(1);
                localStorage.setItem('loggedInUserName', name);
                window.location.href = 'index.html';
            }
        }

        // Handle Sign Up Submission — calls real SQL Server backend
        async function handleSignUp(e) {
            e.preventDefault();
            const name     = document.getElementById('signup-name').value;
            const email    = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const btn      = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Creating account...';
            btn.disabled    = true;

            try {
                await fetch('http://localhost:3000/signup', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ name, email, password })
                });
                superModal({ title: 'Welcome! 🎉', message: 'Account created! Please sign in with your new credentials.' });
                switchForm('login-form');
            } catch (err) {
                // Server offline — log in locally
                console.warn('Server offline, using local fallback:', err);
                localStorage.setItem('loggedInUserName', name);
                window.location.href = 'index.html';
            } finally {
                btn.textContent = 'Sign Up';
                btn.disabled    = false;
            }
        }

        // Handle Forgot Password Submission
        function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            superModal({ title: 'Email Sent 📧', message: 'A password recovery link has been safely sent to ' + email + '.' });
            document.getElementById('forgot-email').value = '';
            switchForm('login-form');
        }

        // Easter egg admin access
        (function initAdminEasterEgg() {
            const logo = document.getElementById('user-logo-egg');
            if (!logo) return;
            
            let clickCount = 0;
            let lastClick = 0;
            
            // Make it slightly responsive
            logo.style.cursor = 'pointer';
            
            logo.addEventListener('click', () => {
                const now = Date.now();
                if (now - lastClick > 1500) {
                    clickCount = 0; // Reset if too slow
                }
                lastClick = now;
                clickCount++;
                
                if (clickCount >= 7) {
                    clickCount = 0;
                    window.location.href = "admin.html";
                }
            });
        })();
    </script>
</body>
</html>

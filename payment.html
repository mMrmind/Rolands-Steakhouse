<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Booking Payment | Roland's</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gcash.css">
    <link rel="stylesheet" href="css/design-system.css">
    <script src="js/design-system.js"></script>
    <style>
        .pay-toggle-btn:hover {
            background: #e2e8f0;
        }

        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="logo"><img src="images/rolandsLOGO.jpg" alt="Logo"></div>
    </header>

    <!-- CUSTOM MODAL ROOT -->
    <div id="super-modal-root"></div>

    <section id="payment-section">
        <div class="payment-card" style="position: relative;">
            <h2 style="font-family:'Playfair Display',serif; color:#2e7d32; margin:0 0 4px; font-size:clamp(22px,5vw,30px);">Complete Payment</h2>
            <p style="color:#888; margin:0 0 8px; font-size:14px;">Scan or save the QR code, then upload your screenshot.</p>

            <!-- Amount badge -->
            <div class="amount-badge">
                <p style="margin:0; font-size:12px; color:#555; text-transform:uppercase; letter-spacing:.5px;">Amount Due</p>
                <p style="margin:6px 0 0; font-size:28px; font-weight:800; color:#1b5e20;">₱<span id="display-amt"></span></p>
            </div>

            <!-- iOS-style toggle with logos -->
            <div class="pay-toggle" id="payToggle" style="align-items: center;">
                <div class="pay-toggle-slider" id="toggleSlider"></div>
                <button class="pay-toggle-btn active" id="btnGcash" onclick="switchQR('gcash')">
                    <img src="images/gcash_logo-removebg-preview.png" alt="GCash" style="height: 38px; object-fit: contain; pointer-events: none;">
                </button>
                <button class="pay-toggle-btn" id="btnQrph" onclick="switchQR('qrph')">
                    <img src="images/download-removebg-preview.png" alt="QR Ph" style="height: 38px; object-fit: contain; pointer-events: none;">
                </button>
            </div>

            <!-- QR Panels -->
            <div class="qr-panels">

                <!-- GCash Panel -->
                <div class="qr-panel active" id="panel-gcash">
                    <div class="qr-img-wrap">
                        <img src="images/gcash-qr.png" alt="GCash QR Code">
                    </div>
                    <button type="button" class="save-btn gcash" onclick="downloadQR('images/gcash-qr.png', 'rolands-gcash-qr.png')">
                        💾 Save to Device
                    </button>
                </div>

                <!-- QR Ph Panel -->
                <div class="qr-panel" id="panel-qrph">
                    <div class="qr-img-wrap">
                        <img src="images/qrph-qr.png" alt="QR Ph Code">
                    </div>
                    <button type="button" class="save-btn qrph" onclick="downloadQR('images/qrph-qr.png', 'rolands-qrph-qr.png')">
                        💾 Save to Device
                    </button>
                </div>

            </div>

            <!-- Upload proof -->
            <div style="margin-top: 28px; text-align:left;">
                <label style="font-weight:700; font-size:13px; color:#333; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:8px;">
                    Upload Payment Screenshot
                </label>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="proof-upload" accept="image/*" onchange="previewProof(this)">
                    <div id="upload-placeholder">
                        <div class="upload-icon">📤</div>
                        <p style="margin:0; font-size:14px; color:#666;">Tap to upload your payment screenshot</p>
                        <p style="margin:4px 0 0; font-size:12px; color:#aaa;">PNG, JPG supported</p>
                    </div>
                    <img id="upload-preview" class="upload-preview" alt="Payment screenshot preview">
                </div>
                <p id="upload-filename" style="font-size:12px; color:#2e7d32; margin:6px 0 0; font-weight:600;"></p>
            </div>

            <!-- Reference No. -->
            <div style="margin-top:18px; text-align:left;">
                <label style="font-weight:700; font-size:13px; color:#333; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:8px;">
                    Reference No. <span style="font-weight:400; color:#aaa;">(optional)</span>
                </label>
                <input type="text" id="ref-num" placeholder="GCash / QR Ph reference number"
                    style="width:100%; padding:13px 14px; border:1px solid #ddd; border-radius:10px; font-size:15px; box-sizing:border-box; font-family:'Roboto',sans-serif;">
            </div>

            <!-- Actions -->
            <button id="confirm-payment-btn" style="width:100%; margin-top:22px; padding:16px; font-size:16px; border-radius:12px;">
                ✅ Confirm &amp; Submit Payment
            </button>

            <button type="button" onclick="cancelBooking()"
                style="width:100%; margin-top:12px; padding:14px; font-size:15px; border-radius:12px;
                       background: transparent; color: #ef4444; border: 2px solid #fca5a5;
                       font-weight: 700; cursor: pointer; font-family:'Roboto',sans-serif; transition: all 0.2s ease;"
                onmouseover="this.style.background='#fef2f2'; this.style.borderColor='#ef4444';"
                onmouseout="this.style.background='transparent'; this.style.borderColor='#fca5a5';">
                ✕ Cancel Booking
            </button>
            <p style="text-align:center; font-size:12px; color:#aaa; margin: 8px 0 0;">
                Cancellation will remove your reservation and return you to the homepage.
            </p>
        </div>
    </section>

    <script>
        const total = localStorage.getItem('totalBill') || '0';
        document.getElementById('display-amt').textContent = Number(total).toLocaleString();



        /* ────────────────────────────────────────
           Back Button Protection
        ──────────────────────────────────────── */
        (function initBackProtection() {
            history.pushState(null, null, window.location.href);
            window.addEventListener('popstate', function () {
                history.pushState(null, null, window.location.href);
                cancelBooking();
            });

            window.onbeforeunload = function() {
                return "Are you sure you want to cancel your booking? Progress will be lost.";
            };
        })();

        /* Cancel booking */
        async function cancelBooking() {
            const confirmed = await superModal({
                title: 'Cancel Payment? ⚠️',
                message: 'Are you sure you want to cancel? Your reservation will be removed and you will be returned to the pre-order area.',
                type: 'confirm',
                confirmText: 'Yes, Cancel',
                cancelText: 'Stay Here'
            });

            if (confirmed) {
                localStorage.removeItem('totalBill');
                localStorage.removeItem('cartItems');
                localStorage.removeItem('reservationData');
                localStorage.removeItem('tempPaymentUpload');
                localStorage.removeItem('pendingReservation');
                
                window.onbeforeunload = null;
                window.location.href = 'pre-order.html';
            }
        }

        /* QR Toggle */
        function switchQR(type) {
            const slider    = document.getElementById('toggleSlider');
            const btnGcash  = document.getElementById('btnGcash');
            const btnQrph   = document.getElementById('btnQrph');
            const panelGcash = document.getElementById('panel-gcash');
            const panelQrph  = document.getElementById('panel-qrph');

            if (type === 'gcash') {
                slider.classList.remove('right');
                btnGcash.classList.add('active');
                btnQrph.classList.remove('active');
                panelGcash.classList.add('active');
                panelQrph.classList.remove('active');
            } else {
                slider.classList.add('right');
                btnGcash.classList.remove('active');
                btnQrph.classList.add('active');
                panelGcash.classList.remove('active');
                panelQrph.classList.add('active');
            }
        }

        /* Canvas-based download — works on file:// */
        function downloadQR(src, filename) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function () {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth;
                canvas.height = img.naturalHeight;
                canvas.getContext('2d').drawImage(img, 0, 0);
                canvas.toBlob(function (blob) {
                    const url = URL.createObjectURL(blob);
                    const a   = document.createElement('a');
                    a.href     = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                }, 'image/png');
            };
            img.onerror = () => window.open(src, '_blank');
            img.src = src;
        }

        /* Proof photo preview */
        function previewProof(input) {
            const preview     = document.getElementById('upload-preview');
            const placeholder = document.getElementById('upload-placeholder');
            const filename    = document.getElementById('upload-filename');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    filename.textContent = input.files[0].name;
                    localStorage.setItem('tempPaymentUpload', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        /* Confirm payment */
        document.getElementById('confirm-payment-btn').addEventListener('click', async () => {
            const ref      = document.getElementById('ref-num').value.trim();
            const fileInput = document.getElementById('proof-upload');
            const hasFile  = fileInput && fileInput.files && fileInput.files.length > 0;

            if (!ref && !hasFile) {
                await superModal({
                    title: 'Missing Info 📋',
                    message: 'Please upload your payment screenshot or enter the reference number.'
                });
                return;
            }

            const btn = document.getElementById('confirm-payment-btn');
            btn.textContent = 'Processing…';
            btn.disabled = true;

            const resNo = 'RES-' + Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('reservationNumber', resNo);

            const reservationHistory = JSON.parse(localStorage.getItem('reservationHistory') || '[]');

            // Inventory stock deduction
            const currentCartStr = localStorage.getItem('currentCartObj');
            if (currentCartStr) {
                try {
                    const cart   = JSON.parse(currentCartStr);
                    const invStr = localStorage.getItem('inventoryItems');
                    if (invStr) {
                        let invItems = JSON.parse(invStr);
                        for (const id in cart) {
                            const idx = invItems.findIndex(i => i.id === id);
                            if (idx > -1) {
                                invItems[idx].sold_stock = (invItems[idx].sold_stock || 0) + cart[id].qty;
                                // Maintain legacy virtual 'stock' for backward-compat in pre-order area
                                invItems[idx].stock = Math.max(0, (invItems[idx].total_stock || 0) + (invItems[idx].added_stock||0) - invItems[idx].sold_stock);
                            }
                        }
                        localStorage.setItem('inventoryItems', JSON.stringify(invItems));
                    }
                    localStorage.removeItem('currentCartObj');
                } catch (e) {
                    console.error('Failed to deduct inventory stock', e);
                }
            }

            const orderText = localStorage.getItem('orderSummary') || '';
            const foodArray = orderText ? orderText.split(', ') : [];
            const dateKey   = localStorage.getItem('arrivalDate') || '';
            const timeKey   = localStorage.getItem('arrivalTime') || '';
            const d         = new Date(dateKey + 'T' + timeKey);
            const displayDt = isNaN(d) ? dateKey + ' ' + timeKey : d.toLocaleString(undefined, {
                weekday: 'short', month: 'short', day: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            });
            localStorage.setItem('arrivalDateTimeDisplay', displayDt);

            // Try server; silent fallback
            try {
                const response = await fetch('http://localhost:3000/reserve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name:  localStorage.getItem('customerName'),
                        date:  dateKey,
                        time:  timeKey,
                        table: localStorage.getItem('bookedTable')
                    })
                });
                if (!response.ok) throw new Error('Server error');
            } catch (err) {
                console.warn('Server offline — saved to localStorage only:', err);
            }

            reservationHistory.push({
                reservationNumber:      resNo,
                reservationType:        'priority',
                arrivalDate:            dateKey,
                arrivalTime:            timeKey,
                arrivalDateTimeDisplay: displayDt,
                customerName:           localStorage.getItem('customerName'),
                bookedTable:            localStorage.getItem('bookedTable'),
                orderSummary:           orderText,
                foods:                  foodArray,
                beefNote:               localStorage.getItem('beefNote') || '',
                paymentAmount:          total,
                paymentRef:             ref,
                paymentProof:           localStorage.getItem('tempPaymentUpload') || '',
                paymentStatus:          'pending',
                completedAt:            new Date().toISOString()
            });

            localStorage.removeItem('tempPaymentUpload');
            localStorage.setItem('reservationHistory', JSON.stringify(reservationHistory));

            window.onbeforeunload = null;

            await superModal({
                title: 'Payment Submitted! 🎉',
                message: 'pls wait for the verification of the payment'
            });
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>

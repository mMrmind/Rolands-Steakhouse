<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Order | Roland's Steak House</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/preorder.css">
    <link rel="stylesheet" href="css/design-system.css">
    <script src="js/design-system.js"></script>
</head>
<body>

    <header id="main-header">
        <div class="logo"><img src="images/rolandsLOGO.jpg" alt="Logo"></div>
        <nav>
            <ul>
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="#" onclick="handleBack(event)" class="nav-link">← Back to Tables</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Banner -->
    <div class="preorder-hero">
        <h1>Priority Pre-Order</h1>
        <p>Table Selected: <strong id="table-display-badge" style="color:white;">None</strong></p>
    </div>

    <!-- ══ MAIN CONTAINER ══ -->
    <div id="preorder-container">

        <!-- Category Sidebar / Scrollable Pills on mobile -->
        <div class="category-sidebar" id="category-sidebar">
            <button class="category-btn" onclick="handleBack(event)" 
                    style="margin-bottom: 25px; background: #f1f5f9; color: #475569; border-direction: row; align-items: center; justify-content: center; gap: 8px;">
                ← Back to Tables
            </button>
            <!-- Generated by JS to avoid HTML-entity encoding issues -->
        </div>

        <!-- Menu Main -->
        <div class="menu-main">
            <h2 class="menu-category-title" id="current-category-title">Pure Beef Steaks</h2>
            <div class="menu-grid" id="menu-grid"></div>
        </div>

        <!-- Cart Sidebar (desktop) -->
        <div class="cart-sidebar">
            <div class="cart-header">
                Your Order
                <span class="cart-clear-btn" onclick="clearCart()">Clear</span>
            </div>
            <div class="cart-items-container" id="cart-items"></div>
            <div class="cart-total-section">
                <div class="cart-total-row"><span>Subtotal</span><span id="cart-subtotal">₱0.00</span></div>
                <div class="cart-total-row"><span>VAT (12% incl.)</span><span>Included</span></div>
                <div class="cart-total"><span>Total</span><span id="cart-total">₱0.00</span></div>
            </div>

            <!-- Beef Preference Panel -->
            <div class="beef-pref-panel">
                <div class="beef-pref-label">🥩 Beef Preference</div>
                <div class="doneness-row" id="doneness-chips">
                    <button type="button" class="doneness-chip" data-val="Rare">Rare</button>
                    <button type="button" class="doneness-chip" data-val="Medium Rare">Medium Rare</button>
                    <button type="button" class="doneness-chip" data-val="Medium">Medium</button>
                    <button type="button" class="doneness-chip" data-val="Well Done">Well Done</button>
                </div>
                <textarea id="beef-note-textarea" class="beef-note-input"
                    placeholder="Special requests, allergies, or anything for the kitchen…"></textarea>
            </div>

            <button class="checkout-btn" id="go-to-pay-btn" disabled>Proceed to Payment</button>
            <button type="button" onclick="handleBack(event)" 
                    style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; color: #64748b; font-weight: bold; margin-top: 12px; cursor: pointer; transition: all 0.2s;"
                    onmouseover="this.style.background='#f8fafc'; this.style.color='#ef4444'; this.style.borderColor='#fee2e2'"
                    onmouseout="this.style.background='white'; this.style.color='#64748b'; this.style.borderColor='#e2e8f0'">
                Cancel & Go Back
            </button>
        </div>
    </div>

    <!-- ══ FLOATING CART BUTTON (mobile/tablet) ══ -->
    <button id="floating-cart-btn" onclick="openCartSheet()">
        🛒 View Order <span id="cart-badge">0</span>
    </button>

    <!-- ══ MOBILE CART SHEET ══ -->
    <div id="cart-sheet-overlay" onclick="closeCartSheet()"></div>
    <div id="cart-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-inner">
            <div class="cart-header">
                Your Order
                <span class="cart-clear-btn" onclick="clearCart()">Clear</span>
            </div>
            <div class="cart-items-container" id="cart-items-sheet"></div>
            <div class="cart-total-section">
                <div class="cart-total-row"><span>Subtotal</span><span id="cart-subtotal-sheet">₱0.00</span></div>
                <div class="cart-total-row"><span>VAT (12% incl.)</span><span>Included</span></div>
                <div class="cart-total"><span>Total</span><span id="cart-total-sheet">₱0.00</span></div>
            </div>

            <!-- Beef Preference in sheet -->
            <div class="beef-pref-panel">
                <div class="beef-pref-label">🥩 Beef Preference</div>
                <div class="doneness-row" id="doneness-chips-sheet">
                    <button type="button" class="doneness-chip" data-val="Rare">Rare</button>
                    <button type="button" class="doneness-chip" data-val="Medium Rare">Medium Rare</button>
                    <button type="button" class="doneness-chip" data-val="Medium">Medium</button>
                    <button type="button" class="doneness-chip" data-val="Well Done">Well Done</button>
                </div>
                <textarea id="beef-note-sheet" class="beef-note-input"
                    placeholder="Special requests, allergies, or notes for the kitchen…"></textarea>
            </div>

            <button class="checkout-btn" id="go-to-pay-sheet" disabled onclick="handleCheckout()">Proceed to Payment</button>
            <button type="button" onclick="handleBack(event)" 
                    style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; color: #64748b; font-weight: bold; margin-top: 12px; cursor: pointer;">
                Cancel & Go Back
            </button>
        </div>
    </div>

    <!-- LIGHTBOX MODAL -->
    <div id="lightbox-modal" 
         style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 9999; display: none; align-items: center; justify-content: center; cursor: zoom-out; transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; transform: scale(0.9);" 
         onclick="closeLightbox()">
        <span style="position: absolute; top: 20px; right: 30px; color: #1b5e20; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
        <div style="display: flex; flex-direction: column; align-items: center; max-width: 90%; max-height: 90%;">
            <img id="lightbox-img" src="" style="max-width: 100%; max-height: 80vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); object-fit: contain; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <div id="lightbox-caption" style="margin-top: 25px; color: #1b5e20; font-size: 28px; font-family: 'Playfair Display', serif; font-weight: 700; text-align: center;"></div>
        </div>
    </div>

    <!-- CUSTOM MODAL ROOT -->
    <div id="super-modal-root"></div>

    <script>
        // ─────────────────────────────────────────────────────────
        // MENU DATA
        // ─────────────────────────────────────────────────────────
        let defaultMenuData = [
            // Beef
            { id:'INV-B1', title:'Fillet Mignon', category:'Beef', price:935, stock: 100 },
            { id:'INV-B2', title:'Tenderloin Steak (200g)', category:'Beef', price:740, stock: 100 },
            { id:'INV-B3', title:'Tenderloin Tips (200g)', category:'Beef', price:740, stock: 100 },
            { id:'INV-B4', title:'Rib Eye Steak (200g-350g)', category:'Beef', price:675, stock: 100 },
            { id:'INV-B5', title:'Hamburger Steak (204g)', category:'Beef', price:505, stock: 100 },
            // T-Bone
            { id:'INV-T1', title:'T-Bone Medium (250g-400g)', category:'T-Bone', price:715, stock: 100 },
            { id:'INV-T2', title:'T-Bone Large (550g-650g)', category:'T-Bone', price:790, stock: 100 },
            { id:'INV-T3', title:'T-Bone Extra Large', category:'T-Bone', price:865, stock: 100 },
            { id:'INV-T4', title:'T-Bone XX Large', category:'T-Bone', price:940, stock: 100 },
            { id:'INV-T5', title:'Porter House (551g-600g)', category:'T-Bone', price:1015, stock: 100 },
            // Sirloin
            { id:'INV-S1', title:'Sirloin Mini (250g-300g)', category:'Sirloin Steak', price:485, stock: 100 },
            { id:'INV-S2', title:'Sirloin Small (251g-350g)', category:'Sirloin Steak', price:545, stock: 100 },
            { id:'INV-S3', title:'Sirloin Mid Size (351g-450g)', category:'Sirloin Steak', price:605, stock: 100 },
            { id:'INV-S4', title:'Sirloin Big Size (401g-450g)', category:'Sirloin Steak', price:670, stock: 100 },
            // Chicken & Fish
            { id:'INV-CF1', title:'Whole Chicken', category:'Chicken & Fish', price:660, stock: 100 },
            { id:'INV-CF2', title:'Half Chicken', category:'Chicken & Fish', price:335, stock: 100 },
            { id:'INV-CF3', title:'Fish Steak (Tanigue)', category:'Chicken & Fish', price:495, stock: 100 },
            { id:'INV-CF4', title:'Bangus Steak', category:'Chicken & Fish', price:510, stock: 100 },
            // Sandwich
            { id:'INV-SW1', title:'Big Sunny Burger with Fries', category:'Sandwich', price:430, stock: 100 },
            { id:'INV-SW2', title:'Big Sunny Steak Sandwich with Fries', category:'Sandwich', price:400, stock: 100 },
            { id:'INV-SW3', title:'Steak Sandwich', category:'Sandwich', price:165, stock: 100 },
            { id:'INV-SW4', title:'Cheeseburger', category:'Sandwich', price:170, stock: 100 },
            { id:'INV-SW5', title:'Hamburger', category:'Sandwich', price:160, stock: 100 },
            // Drinks
            { id:'INV-D1', title:'Mango Juice', category:'Drinks', price:135, stock: 100 },
            { id:'INV-D2', title:'Four Seasons', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D3', title:'Pineapple Juice', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D4', title:'Pine-Orange Juice', category:'Drinks', price:90, stock: 100 },
            { id:'INV-D5', title:'Iced Tea', category:'Drinks', price:85, stock: 100 },
            { id:'INV-D6', title:'Cucumber Juice', category:'Drinks', price:90, stock: 100 },
            { id:'INV-D7', title:'Blue Lemonade', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D8', title:'Calamansi Juice (Hot/Cold)', category:'Drinks', price:70, stock: 100 },
            { id:'INV-D9', title:'Coke in Can', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D10', title:'Sprite | Royal in Can', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D11', title:'San Miguel Pale Pilsen', category:'Drinks', price:85, stock: 100 },
            { id:'INV-D12', title:'San Mig Light', category:'Drinks', price:95, stock: 100 },
            { id:'INV-D13', title:'Hot Tea', category:'Drinks', price:70, stock: 100 },
            { id:'INV-D14', title:'Drip Coffee', category:'Drinks', price:85, stock: 100 },
            { id:'INV-D15', title:'Coffee with Cream', category:'Drinks', price:55, stock: 100 },
            { id:'INV-D16', title:'Bottled Water (500ml)', category:'Drinks', price:35, stock: 100 },
            // Wines
            { id:'INV-W1', title:'Carlo Rossi (Red Wine)', category:'Wines', price:700, stock: 100 },
            { id:'INV-W2', title:'Carlo Rossi (White Wine)', category:'Wines', price:700, stock: 100 },
            { id:'INV-W3', title:'Adega De Pegoos', category:'Wines', price:600, stock: 100 },
            // Sides
            { id:'INV-SO1', title:'Cream of Mushroom Soup', category:'Side Orders', price:80, stock: 100 },
            { id:'INV-SO2', title:'Cream of Chicken Soup', category:'Side Orders', price:80, stock: 100 },
            { id:'INV-SO3', title:'Mashed Potato', category:'Side Orders', price:90, stock: 100 },
            { id:'INV-SO4', title:'Potato Salad', category:'Side Orders', price:155, stock: 100 },
            { id:'INV-SO5', title:'French Fries', category:'Side Orders', price:155, stock: 100 },
            { id:'INV-SO6', title:'Garlic Bread', category:'Side Orders', price:45, stock: 100 },
            { id:'INV-SO7', title:'Garlic Rice', category:'Side Orders', price:55, stock: 100 },
            { id:'INV-SO8', title:'Plain Rice', category:'Side Orders', price:40, stock: 100 }
        ];

        function getMenuData() {
            try {
                let inv = localStorage.getItem('inventoryItems');
                let invItems = [];

                if (inv) {
                    try {
                        const parsed = JSON.parse(inv);
                        if (Array.isArray(parsed)) invItems = parsed;
                    } catch (e) {
                        console.error("Pre-Order Inventory JSON corrupt:", e);
                    }
                }

                const validCats = ['Beef', 'T-Bone', 'Sirloin Steak', 'Chicken & Fish', 'Sandwich', 'Side Orders', 'Drinks', 'Wines'];

                // Normalize & compute stock for an item
                function normalizeItem(i) {
                    const name = (i.title || i.name || "").toLowerCase();

                    if (!validCats.includes(i.category) || i.category === 'Food Ingredients') {
                        if (name.match(/fillet mignon|tenderloin|rib eye|hamburger steak|beef|ribeye/)) i.category = 'Beef';
                        else if (name.match(/t-bone|porterhouse|porter house/)) i.category = 'T-Bone';
                        else if (name.match(/sirloin/)) i.category = 'Sirloin Steak';
                        else if (name.match(/chicken|fish|bangus|tanigue|salmon|seafood/)) i.category = 'Chicken & Fish';
                        else if (name.match(/burger|sandwich|hamburger|cheeseburger/)) i.category = 'Sandwich';
                        else if (name.match(/rice|fries|salad|soup|bread|garlic|potato|mash/)) i.category = 'Side Orders';
                        else if (name.match(/wine|carlo rossi|adega|pegoes|rossi/)) i.category = 'Wines';
                        else if (name.match(/juice|tea|coffee|coke|sprite|water|royal|pilsen|lemonade|calamansi|beer|san mig|light|drip|cucumber|four seasons/)) i.category = 'Drinks';
                        else i.category = 'Others';
                    }

                    // Keep Wine separate from generic drinks
                    if (i.category === 'Drinks' && name.match(/wine|carlo rossi|adega/)) i.category = 'Wines';

                    // Compute virtual stock
                    const virtualStock = (i.total_stock !== undefined)
                        ? (i.total_stock + (i.added_stock || 0) - (i.sold_stock || 0))
                        : (i.stock || 0);
                    i.stock = Math.max(0, virtualStock);
                    return i;
                }

                // Build a map of IDs present in the admin inventory
                const invMap = {};
                invItems.forEach(i => { if (i.id) invMap[i.id] = normalizeItem(i); });

                // Merge: start with all defaults, then overlay any matching inventory entries.
                // This guarantees every default category always has items, even if the admin
                // inventory is incomplete. Inventory values take priority for stock/price/etc.
                const merged = defaultMenuData.map(def => invMap[def.id] ? invMap[def.id] : def);

                // Append any inventory-only items that don't exist in the defaults (custom items)
                invItems.forEach(i => {
                    if (i.id && !merged.find(m => m.id === i.id)) {
                        merged.push(normalizeItem(i));
                    }
                });

                return merged;

            } catch (err) {
                console.error("Critical Pre-Order Menu Crash:", err);
            }
            return defaultMenuData;
        }

        let menuData = getMenuData();

        // ─────────────────────────────────────────────────────────
        // CATEGORY DEFINITIONS  (single source of truth)
        // ─────────────────────────────────────────────────────────
        const CATEGORIES = [
            { key: 'Beef',              label: '🥩 Beef' },
            { key: 'T-Bone',            label: '🦴 T-Bone' },
            { key: 'Sirloin Steak',     label: '🥩 Sirloin Steak' },
            { key: 'Chicken & Fish',    label: '🍗 Chicken & Fish' },
            { key: 'Sandwich',          label: '🍔 Sandwich' },
            { key: 'Side Orders',       label: '🍟 Side Orders' },
            { key: 'Drinks',            label: '🍹 Drinks' },
            { key: 'Wines',             label: '🍷 Wines' }
        ];

        let cart = {};
        try {
            const savedCart = localStorage.getItem('preOrderCart');
            if (savedCart) cart = JSON.parse(savedCart);
        } catch (e) {
            console.error("Cart recovery failed:", e);
        }

        let currentCategory = CATEGORIES[0].key;  // start on Beef
        let selectedDoneness = '';

        // ─────────────────────────────────────────────────────────
        // HELPERS
        // ─────────────────────────────────────────────────────────
        const fmt = n => '₱' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 });

        function getTotal() {
            return Object.keys(cart).reduce((sum, id) => {
                const item = menuData.find(i => i.id === id);
                return sum + (item ? item.price * cart[id].qty : 0);
            }, 0);
        }

        // ─────────────────────────────────────────────────────────
        // RENDER MENU GRID
        // ─────────────────────────────────────────────────────────
        const menuGrid = document.getElementById('menu-grid');
        const categoryTitle = document.getElementById('current-category-title');

        function renderMenu() {
            menuGrid.innerHTML = '';

            menuData.filter(i => i.category === currentCategory).forEach(item => {
                const isSoldOut = item.stock <= 0;
                const isLow = item.stock > 0 && item.stock <= (item.threshold || 5);
                const qty = cart[item.id]?.qty || 0;
                
                const card = document.createElement('div');
                card.className = 'menu-card' + (isSoldOut ? ' sold-out' : '');
                
                if(isSoldOut) {
                    card.style.opacity = '0.5';
                    card.style.filter = 'grayscale(100%)';
                }
                
                let controlsHtml = '';
                if(isSoldOut) {
                    controlsHtml = `<div style="font-weight: 800; color: #d32f2f; padding: 10px 0; text-align:center;">SOLD OUT</div>`;
                } else {
                    controlsHtml = `
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty('${item.id}',-1)" aria-label="Remove">−</button>
                            <span class="qty-display">${qty}</span>
                            <button class="qty-btn add" onclick="updateQty('${item.id}',1)" aria-label="Add">+</button>
                        </div>
                    `;
                }

                const badgeHtml = isLow ? `<div style="position:absolute; top:8px; left:8px; background:#ef4444; color:white; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:800; z-index:10; box-shadow:0 2px 5px rgba(0,0,0,0.2);">Only ${item.stock} left!</div>` : '';

                card.innerHTML = `
                    <div style="position:relative; overflow:hidden; cursor: zoom-in; transition: transform 0.3s;" 
                         onclick="openLightbox('${item.image || `https://placehold.co/800x600/f0fdf4/2e7d32?text=${encodeURIComponent(item.title)}`}', '${item.title}')"
                         onmouseover="this.style.transform='scale(1.02)'" 
                         onmouseout="this.style.transform='scale(1)'">
                        ${badgeHtml}
                        <img class="menu-img" src="${item.image ? item.image : `https://placehold.co/400x300/f0fdf4/2e7d32?text=${encodeURIComponent(item.title.split(' ')[0])}`}" alt="${item.title}" style="object-fit:cover; width:100%; height:150px; display: block;">
                        <div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.5); color:white; font-size:10px; padding:4px; text-align:center; opacity:0; transition: opacity 0.2s;" class="zoom-hint">Click to enlarge</div>
                    </div>
                    <div class="menu-info">
                        <div class="menu-title">${item.title}</div>
                        <div class="menu-price">${fmt(item.price)}</div>
                    </div>
                    ${controlsHtml}
                `;
                menuGrid.appendChild(card);
            });
        }

        // ─────────────────────────────────────────────────────────
        // RENDER CART  (updates both sidebar + sheet simultaneously)
        // ─────────────────────────────────────────────────────────
        function buildCartItemsHTML() {
            const keys = Object.keys(cart);
            if (!keys.length) return '<div class="cart-empty">Cart is empty. Add items from the menu.</div>';
            return keys.map(id => {
                const item = menuData.find(i => i.id === id);
                if (!item) return '';
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div><span class="cart-qty">${cart[id].qty}x</span><span class="cart-item-title">${item.title}</span></div>
                        </div>
                        <div class="cart-item-price">${fmt(item.price * cart[id].qty)}</div>
                    </div>`;
            }).join('');
        }

        function renderCart() {
            const total   = getTotal();
            const fmtTotal = fmt(total);
            const html    = buildCartItemsHTML();
            const itemCount = Object.values(cart).reduce((s, v) => s + v.qty, 0);

            // Desktop sidebar
            document.getElementById('cart-items').innerHTML     = html;
            document.getElementById('cart-subtotal').textContent = fmtTotal;
            document.getElementById('cart-total').textContent    = fmtTotal;

            // Mobile sheet
            document.getElementById('cart-items-sheet').innerHTML       = html;
            document.getElementById('cart-subtotal-sheet').textContent  = fmtTotal;
            document.getElementById('cart-total-sheet').textContent     = fmtTotal;

            // Floating btn badge
            const badge = document.getElementById('cart-badge');
            badge.textContent = itemCount;
            badge.style.display = itemCount > 0 ? 'inline-block' : 'none';

            // Enable/disable checkout buttons
            const hasItems = total > 0;
            document.getElementById('go-to-pay-btn').disabled   = !hasItems;
            document.getElementById('go-to-pay-sheet').disabled = !hasItems;

            if (hasItems) {
                localStorage.setItem('totalBill', total);
                localStorage.setItem('orderSummary',
                    Object.keys(cart).map(id => {
                        const item = menuData.find(i => i.id === id);
                        return item ? `${cart[id].qty}x ${item.title}` : '';
                    }).filter(Boolean).join(', ')
                );
                localStorage.setItem('preOrderCart', JSON.stringify(cart));
            } else {
                localStorage.removeItem('totalBill');
                localStorage.removeItem('orderSummary');
                localStorage.removeItem('preOrderCart');
            }
        }

        // ─────────────────────────────────────────────────────────
        // CART ACTIONS
        // ─────────────────────────────────────────────────────────
        window.updateQty = function(id, delta) {
            const item = menuData.find(i => i.id === id);
            if(!item) return;

            if (!cart[id]) cart[id] = { qty: 0 };
            
            let newQty = cart[id].qty + delta;
            
            // Validate Stock Maximum limit before assigning
            if (newQty > item.stock) {
                superModal({ title: 'Low Stock 📉', message: `Only ${item.stock} units of ${item.title} are available.` });
                newQty = item.stock; 
            }

            cart[id].qty = newQty;
            if (cart[id].qty <= 0) delete cart[id];
            
            renderMenu();
            renderCart();
        };

        window.clearCart = function() {
            cart = {};
            renderMenu();
            renderCart();
        };

        // ─────────────────────────────────────────────────────────
        // LIGHTBOX
        // ─────────────────────────────────────────────────────────
        window.openLightbox = function(src, title) {
            const modal = document.getElementById('lightbox-modal');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            
            img.src = src;
            caption.textContent = title;
            modal.style.display = 'flex';
            
            // Trigger animation
            setTimeout(() => { 
                modal.style.opacity = '1'; 
                modal.style.transform = 'scale(1)';
                img.style.transform = 'scale(1)';
            }, 10);
            document.body.style.overflow = 'hidden';
        };

        window.closeLightbox = function() {
            const modal = document.getElementById('lightbox-modal');
            const img = document.getElementById('lightbox-img');
            modal.style.opacity = '0';
            modal.style.transform = 'scale(0.9)';
            img.style.transform = 'scale(0.9)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
            document.body.style.overflow = '';
        };

        // ─────────────────────────────────────────────────────────
        // BEEF PREFERENCE  (sync both desktop + sheet chips/textareas)
        // ─────────────────────────────────────────────────────────
        function syncDoneness(chosenVal) {
            selectedDoneness = chosenVal;
            // Sync all chip groups
            document.querySelectorAll('.doneness-chip').forEach(c => {
                c.classList.toggle('active', c.getAttribute('data-val') === chosenVal);
            });
            saveBeefNote();
        }

        function saveBeefNote() {
            const textarea  = document.getElementById('beef-note-textarea');
            const sheetArea = document.getElementById('beef-note-sheet');
            // Keep both textareas in sync
            const note = textarea.value;
            sheetArea.value = note;

            const parts = [];
            if (selectedDoneness) parts.push(`Doneness: ${selectedDoneness}`);
            if (note.trim()) parts.push(note.trim());
            localStorage.setItem('beefNote', parts.join(' | '));
        }

        document.querySelectorAll('.doneness-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const val = chip.getAttribute('data-val');
                syncDoneness(val === selectedDoneness ? '' : val); // toggle
            });
        });

        const textareaDesktop = document.getElementById('beef-note-textarea');
        const textareaSheet   = document.getElementById('beef-note-sheet');

        textareaDesktop.addEventListener('input', () => {
            textareaSheet.value = textareaDesktop.value;
            saveBeefNote();
        });
        textareaSheet.addEventListener('input', () => {
            textareaDesktop.value = textareaSheet.value;
            saveBeefNote();
        });

        // ─────────────────────────────────────────────────────────
        // CHECKOUT
        // ─────────────────────────────────────────────────────────
        window.handleCheckout = function() { 
            // Exact JSON object to deduct correct stock in payment.html
            localStorage.setItem('currentCartObj', JSON.stringify(cart));
            window.location.href = 'payment.html'; 
        };
        document.getElementById('go-to-pay-btn').addEventListener('click', handleCheckout);

        // ─────────────────────────────────────────────────────────
        // MOBILE SHEET OPEN / CLOSE
        // ─────────────────────────────────────────────────────────
        window.openCartSheet = function() {
            document.getElementById('cart-sheet-overlay').classList.add('open');
            document.getElementById('cart-sheet').classList.add('open');
            document.body.style.overflow = 'hidden';
        };
        window.closeCartSheet = function() {
            document.getElementById('cart-sheet-overlay').classList.remove('open');
            document.getElementById('cart-sheet').classList.remove('open');
            document.body.style.overflow = '';
        };

        // ─────────────────────────────────────────────────────────
        // CATEGORY TABS  — built from JS, no HTML-entity issues
        // ─────────────────────────────────────────────────────────
        const sidebar = document.getElementById('category-sidebar');

        CATEGORIES.forEach((cat, i) => {
            const btn = document.createElement('button');
            btn.className = 'category-btn' + (currentCategory === cat.key ? ' active' : '');
            btn.textContent = cat.label;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = cat.key;
                // Strip emoji and space for title display
                categoryTitle.textContent = cat.label.replace(/^.*?[\s\uFE0F]/, '').trim(); 
                renderMenu();
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
            sidebar.appendChild(btn);
        });

        // ─────────────────────────────────────────────────────────
        // REAL-TIME SYNC FOR INVENTORY ITEMS
        // ─────────────────────────────────────────────────────────
        window.addEventListener('storage', (e) => {
            if (e.key === 'inventoryItems') {
                menuData = getMenuData();
                let cartChanged = false;
                let alertMsg = "";
                
                for (let id in cart) {
                    const latestItemInfo = menuData.find(i => i.id === id);
                    if (!latestItemInfo || latestItemInfo.stock <= 0) {
                        delete cart[id];
                        cartChanged = true;
                        alertMsg += `- An item was removed (no longer available)\n`;
                    } else if (cart[id].qty > latestItemInfo.stock) {
                        cart[id].qty = latestItemInfo.stock;
                        cartChanged = true;
                        alertMsg += `- ${latestItemInfo.title} quantity reduced to ${latestItemInfo.stock} (stock went down)\n`;
                    }
                }
                
                renderMenu();
                if (cartChanged) {
                    renderCart();
                    superModal({ title: 'Menu Updated 🔄', message: 'Stock levels have changed:\n' + alertMsg });
                }
            }
        });

        // ─────────────────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────────────────
        document.getElementById('table-display-badge').textContent =
            localStorage.getItem('bookedTable') || 'None Selected';

        renderMenu();
        renderCart();



        window.handleBack = async function(e) {
            if (e) e.preventDefault();
            const itemCount = Object.keys(cart).length;
            
            let title = 'Going Back?';
            let msg = 'Are you sure you want to go back?';
            
            if (itemCount === 0) {
                title = 'Wait! ⚠️';
                msg = 'You haven\'t ordered anything yet! Are you sure you want to leave the pre-order area?';
            } else {
                title = 'Cancel Order? ⚠️';
                msg = 'Are you sure? Your current food selection will be cleared if you leave now.';
            }

            const confirmed = await superModal({
                title: title,
                message: msg,
                type: 'confirm',
                confirmText: 'Yes, Go Back',
                cancelText: 'Stay Here'
            });

            if (confirmed) {
                window.location.href = 'seat-selection.html';
            } else {
                // If they cancel, push the state back to keep the "back button" trapped
                history.pushState(null, null, location.href);
            }
        };

        // BROWSER BACK BUTTON TRAP
        // Push an extra entry so when they click back, we catch the popstate event
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            handleBack();
        };
    </script>
</body>
</html>

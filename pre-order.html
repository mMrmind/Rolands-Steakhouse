<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Order | Roland's Steak House</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/preorder.css">
</head>
<body>
    <header id="main-header">
        <div class="logo"><img src="images/rolandsLOGO.jpg" alt="Logo"></div>
        <nav>
            <ul>
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="seat-selection.html" class="nav-link">Back to Tables</a></li>
            </ul>
        </nav>
    </header>

    <div style="background: #1b5e20; color: white; padding: 20px 40px; text-align: center;">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px;">Priority Pre-Order</h1>
        <p style="font-size: 16px; color: #a5d6a7;">Table Selected: <strong id="table-display-badge" style="color: white;">None</strong></p>
    </div>

    <div id="preorder-container">
        <!-- Categories -->
        <div class="category-sidebar" id="category-sidebar">
            <button class="category-btn active" data-cat="Beef">Pure Beef Steaks</button>
            <button class="category-btn" data-cat="T-Bone & Sirloin">T-Bone & Sirloin</button>
            <button class="category-btn" data-cat="Chicken & Fish">Chicken & Fish</button>
            <button class="category-btn" data-cat="Sandwich & Sides">Sandwiches & Sides</button>
            <button class="category-btn" data-cat="Drinks">Drinks & Wine</button>
        </div>

        <!-- Main Menu -->
        <div class="menu-main">
            <h2 class="menu-category-title" id="current-category-title">Pure Beef Steaks</h2>
            <div class="menu-grid" id="menu-grid">
                <!-- Javascript will render food items here -->
            </div>
        </div>

        <!-- Cart Sidebar -->
        <div class="cart-sidebar">
            <div class="cart-header">
                Your Order
                <span style="font-size: 14px; font-family: Roboto; font-weight: normal; color: #64748b; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 12px; cursor: pointer;" onclick="clearCart()">Clear</span>
            </div>
            
            <div class="cart-items-container" id="cart-items">
                <!-- Cart items rendered here -->
            </div>

            <div class="cart-total-section">
                <div class="cart-total-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">₱0.00</span>
                </div>
                <div class="cart-total-row">
                    <span>VAT (12% incl.)</span>
                    <span>Included</span>
                </div>
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cart-total">₱0.00</span>
                </div>
            </div>

            <button class="checkout-btn" id="go-to-pay-btn" disabled>Proceed to GCash</button>
        </div>
    </div>

    <script>
        const menuData = [
            // B E E F
            { id: 'm5', title: 'Fillet Mignon', category: 'Beef', price: 935 },
            { id: 'm6', title: 'Tenderloin Steak (200g)', category: 'Beef', price: 740 },
            { id: 'm7', title: 'Tenderloin Tips (200g)', category: 'Beef', price: 740 },
            { id: 'm8', title: 'Rib Eye Steak (200-350g)', category: 'Beef', price: 675 },
            { id: 'm9', title: 'Hamburger Steak (204g)', category: 'Beef', price: 505 },

            // T - B O N E  &  S I R L O I N
            { id: 't1', title: 'T-Bone Medium (250-400g)', category: 'T-Bone & Sirloin', price: 715 },
            { id: 't2', title: 'T-Bone Large (450-500g)', category: 'T-Bone & Sirloin', price: 790 },
            { id: 't3', title: 'T-Bone Extra Large (551-500g)', category: 'T-Bone & Sirloin', price: 865 },
            { id: 't4', title: 'T-Bone XX Large (551-500g)', category: 'T-Bone & Sirloin', price: 940 },
            { id: 't5', title: 'Porter House (551-600g)', category: 'T-Bone & Sirloin', price: 1015 },
            { id: 's1', title: 'Sirloin Mini (250-300g)', category: 'T-Bone & Sirloin', price: 485 },
            { id: 's2', title: 'Sirloin Small (251-350g)', category: 'T-Bone & Sirloin', price: 545 },
            { id: 's3', title: 'Sirloin Mid Size (351-450g)', category: 'T-Bone & Sirloin', price: 605 },
            { id: 's4', title: 'Sirloin Big Size (401-450g)', category: 'T-Bone & Sirloin', price: 670 },

            // C H I C K E N  &  F I S H
            { id: 'm1', title: 'Whole Chicken', category: 'Chicken & Fish', price: 660 },
            { id: 'm2', title: 'Half Chicken', category: 'Chicken & Fish', price: 335 },
            { id: 'm3', title: 'Fish Steak (Tanigue)', category: 'Chicken & Fish', price: 495 },
            { id: 'm4', title: 'Bangus Steak', category: 'Chicken & Fish', price: 510 },

            // S I D E S  &  S A N D W I C H E S
            { id: 'sw1', title: 'Big Sunny Burger with Fries', category: 'Sandwich & Sides', price: 430 },
            { id: 'sw2', title: 'Big Sunny Steak Sandwich', category: 'Sandwich & Sides', price: 400 },
            { id: 'sw3', title: 'Steak Sandwich', category: 'Sandwich & Sides', price: 165 },
            { id: 'sw4', title: 'Cheeseburger', category: 'Sandwich & Sides', price: 170 },
            { id: 'sd1', title: 'Cream of Mushroom Soup', category: 'Sandwich & Sides', price: 80 },
            { id: 'sd2', title: 'Cream of Chicken Soup', category: 'Sandwich & Sides', price: 80 },
            { id: 'sd3', title: 'Potato Salad', category: 'Sandwich & Sides', price: 155 },
            { id: 'sd4', title: 'French Fries', category: 'Sandwich & Sides', price: 155 },
            { id: 'sd5', title: 'Mashed Potato', category: 'Sandwich & Sides', price: 90 },
            { id: 'sd6', title: 'Garlic Rice', category: 'Sandwich & Sides', price: 55 },
            { id: 'sd7', title: 'Plain Rice', category: 'Sandwich & Sides', price: 40 },

            // D R I N K S
            { id: 'd1', title: 'Mango Juice', category: 'Drinks', price: 135 },
            { id: 'd2', title: 'Pineapple Juice', category: 'Drinks', price: 95 },
            { id: 'd3', title: 'Four Seasons', category: 'Drinks', price: 95 },
            { id: 'd4', title: 'Iced Tea', category: 'Drinks', price: 85 },
            { id: 'd5', title: 'Blue Lemonade', category: 'Drinks', price: 95 },
            { id: 'd6', title: 'Coke in Can', category: 'Drinks', price: 95 },
            { id: 'd7', title: 'San Mig Light', category: 'Drinks', price: 95 },
            { id: 'd8', title: 'Drip Coffee', category: 'Drinks', price: 85 },
            { id: 'd9', title: 'Bottled Water (500ml)', category: 'Drinks', price: 35 },
            { id: 'w1', title: 'Carlo Rossi (Red)', category: 'Drinks', price: 700 },
            { id: 'w2', title: 'Adega De Pegões', category: 'Drinks', price: 600 }
        ];

        let cart = {}; // format: { 'm5': { qty: 2 }, ... }
        let currentCategory = 'Beef';

        const menuGrid = document.getElementById('menu-grid');
        const cartItemsContainer = document.getElementById('cart-items');
        const subtotalEl = document.getElementById('cart-subtotal');
        const totalEl = document.getElementById('cart-total');
        const payBtn = document.getElementById('go-to-pay-btn');
        const categoryTitle = document.getElementById('current-category-title');

        // Restore booked table header
        document.getElementById('table-display-badge').textContent = localStorage.getItem('bookedTable') || 'None Selected';

        function renderMenu() {
            menuGrid.innerHTML = '';
            const filteredItems = menuData.filter(item => item.category === currentCategory);

            filteredItems.forEach(item => {
                const qty = cart[item.id] ? cart[item.id].qty : 0;
                
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <img class="menu-img" src="https://placehold.co/400x300/f8fafc/2e7d32?text=${encodeURIComponent(item.title.split(' ')[0])}" alt="${item.title}">
                    <div class="menu-info">
                        <div class="menu-title">${item.title}</div>
                        <div class="menu-price">₱${item.price.toFixed(2)}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <span class="qty-display">${qty}</span>
                        <button class="qty-btn add" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                `;
                menuGrid.appendChild(card);
            });
        }

        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            let orderSummaryArray = [];

            Object.keys(cart).forEach(id => {
                const itemDef = menuData.find(item => item.id === id);
                if(itemDef) {
                    const lineTotal = itemDef.price * cart[id].qty;
                    total += lineTotal;
                    orderSummaryArray.push(`${cart[id].qty}x ${itemDef.title}`);

                    const row = document.createElement('div');
                    row.className = 'cart-item';
                    row.innerHTML = `
                        <div class="cart-item-info">
                            <span class="cart-qty">${cart[id].qty}</span>
                            <span class="cart-item-title">${itemDef.title}</span>
                        </div>
                        <div class="cart-item-price">₱${lineTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    `;
                    cartItemsContainer.appendChild(row);
                }
            });

            if (Object.keys(cart).length === 0) {
                cartItemsContainer.innerHTML = '<div style="color: #94a3b8; font-style: italic; padding: 10px 0;">Cart is empty. Add items from the menu.</div>';
            }

            const formattedTotal = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            subtotalEl.textContent = `₱${formattedTotal}`;
            totalEl.textContent = `₱${formattedTotal}`;

            if(total > 0) {
                payBtn.disabled = false;
                localStorage.setItem('totalBill', total);
                localStorage.setItem('orderSummary', orderSummaryArray.join(", "));
            } else {
                payBtn.disabled = true;
                localStorage.removeItem('totalBill');
                localStorage.removeItem('orderSummary');
            }
        }

        window.updateQty = function(id, delta) {
            if (!cart[id]) cart[id] = { qty: 0 };
            cart[id].qty += delta;

            if (cart[id].qty <= 0) delete cart[id];
            
            renderMenu();
            renderCart();
        };

        window.clearCart = function() {
            cart = {};
            renderMenu();
            renderCart();
        };

        // Initialize Categories
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-cat');
                categoryTitle.textContent = e.target.textContent;
                renderMenu();
            });
        });

        payBtn.addEventListener('click', () => {
            window.location.href = "payment.html";
        });

        // First render
        renderMenu();
        renderCart();
    </script>
</body>
</html>

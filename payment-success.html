<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Roland's</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/design-system.css">
    <script src="js/design-system.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7, #f0fdf4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(27,94,32,0.15);
            position: relative;
            overflow: hidden;
        }
        .success-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #16a34a, #22c55e, #4ade80);
        }
        .check-circle {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(22,163,74,0.35);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .check-circle svg { width: 44px; height: 44px; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px; color: #1b5e20;
            margin-bottom: 10px;
        }
        .sub { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
        .res-badge {
            background: #f0fdf4;
            border: 2px solid #bbf7d0;
            border-radius: 14px;
            padding: 18px 24px;
            margin-bottom: 28px;
        }
        .res-badge .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .res-badge .code { font-size: 26px; font-weight: 800; color: #16a34a; letter-spacing: 2px; margin-top: 6px; }
        .home-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(22,163,74,0.3);
        }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(22,163,74,0.35); }
        .pm-note { margin-top: 16px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Payment Successful!</h1>
        <p class="sub">Your priority reservation at Roland's Steakhouse has been confirmed. We look forward to serving you!</p>
        <div class="res-badge">
            <div class="label">Reservation Number</div>
            <div class="code" id="res-number">Loading...</div>
        </div>
        <a href="index.html" class="home-btn">🏠 Return to Homepage</a>
        <p class="pm-note">Payment processed securely via PayMongo</p>
    </div>

    <script>
        // Grab reservation number from URL or localStorage
        const params = new URLSearchParams(window.location.search);
        const resNo  = params.get('resno') || localStorage.getItem('reservationNumber') || 'N/A';
        document.getElementById('res-number').textContent = resNo;

        // Mark the reservation as paid in history
        const hist = JSON.parse(localStorage.getItem('reservationHistory') || '[]');
        const entry = hist.find(r => r.reservationNumber === resNo);
        if (entry) {
            entry.paymentStatus = 'paid';
            localStorage.setItem('reservationHistory', JSON.stringify(hist));

            // Automatically inject E-Receipt into the Live Support Chat
            const chats = JSON.parse(localStorage.getItem('messages') || '[]');
            const resNoStr = entry.reservationNumber;
            const hasReceipt = chats.some(c => c.res_no === resNoStr && c.message.includes('RECEIPT'));

            if (!hasReceipt) {
                const amount = entry.paymentAmount || entry.total || 0;
                const fmtAmt = Number(amount).toLocaleString(undefined, {minimumFractionDigits: 2});
                const receiptMsg = `🧾 OFFICIAL E-RECEIPT\nReservation: #${resNoStr}\nStatus: PAID via PayMongo\nAmount: ₱${fmtAmt}\n\nThank you! Your table is 100% confirmed. Send us a message here if you have any questions or special requests.`;
                
                chats.push({
                    id: Date.now().toString() + "_sys",
                    sender_id: 'system',
                    sender_type: 'staff', // Make it come from the staff/system side
                    message: receiptMsg,
                    created_at: new Date().toISOString(),
                    res_no: resNoStr
                });
                localStorage.setItem('messages', JSON.stringify(chats));
                window.dispatchEvent(new Event('storage'));
            }
        }

        // Clear checkout data
        localStorage.removeItem('totalBill');
        localStorage.removeItem('cartItems');
        localStorage.removeItem('reservationData');
        localStorage.removeItem('pendingReservation');
        localStorage.removeItem('paymongoSessionId');
    </script>
</body>
</html>
